<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tallhagen Unblocked</title>
    <style>
        body {
            margin: 0;
            background: #000 url('https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJpbmZ6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3/l41lTjJ8zZ6Z6Z6Z6/giphy.gif') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* Glass Overlay to make games readable */
        .overlay {
            background: rgba(0, 0, 0, 0.7);
            min-height: 100vh;
            padding: 20px;
        }

        h1 { text-align: center; text-shadow: 0 0 20px #00d4ff; font-size: 3rem; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .card:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 25px #00d4ff;
            border-color: #00d4ff;
        }

        .card img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
        }

        .card p { margin: 10px 0 0; font-size: 14px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>
    <div class="overlay">
        <h1>🎮 Tallhagen Unblocked</h1>
        <div id="game-grid" class="grid">Loading 500+ Games...</div>
    </div>

    <script>
        const hoverSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
        
        // ULTIMATE LAZY MOVE: Fetching a massive list from a public database
        fetch('https://raw.githubusercontent.com/skid-inc/skid-inc.github.io/main/games.json')
            .then(res => res.json())
            .then(games => {
                const grid = document.getElementById('game-grid');
                grid.innerHTML = ''; 

                games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    // Use a fallback image if the game doesn't have one
                    const icon = game.game_image_icon || 'https://via.placeholder.com/150/00d4ff/ffffff?text=Game';
                    
                    card.innerHTML = `
                        <img src="${icon}" loading="lazy">
                        <p>${game.name}</p>
                    `;

                    card.onmouseenter = () => { hoverSound.currentTime = 0; hoverSound.play(); };
                    card.onclick = () => {
                        window.location.href = `play.html?url=${game.game_url}`;
                    };
                    grid.appendChild(card);
                });
            })
            .catch(err => {
                document.getElementById('game-grid').innerHTML = "Error loading games. GitHub might be rate-limiting. Try refreshing!";
            });
    </script>
</body>
</html>
