<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tallhagen | Unblocked</title>
    <style>
        body { margin: 0; background: #0b0e14; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .nav { background: #161b22; padding: 20px; text-align: center; border-bottom: 3px solid #00d4ff; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { margin: 0; font-size: 2.5rem; color: #00d4ff; text-transform: uppercase; letter-spacing: 4px; text-shadow: 0 0 10px #00d4ff; }
        .search-container { margin-top: 15px; }
        #search { width: 60%; padding: 12px 20px; border-radius: 25px; border: none; background: #0d1117; color: white; border: 1px solid #30363d; font-size: 1rem; outline: none; transition: 0.3s; }
        #search:focus { border-color: #00d4ff; box-shadow: 0 0 10px #00d4ff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; padding: 40px; }
        .card { background: #161b22; border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; border: 1px solid #30363d; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-8px); border-color: #00d4ff; box-shadow: 0 10px 20px rgba(0,212,255,0.2); }
        .card img { width: 100%; height: 110px; object-fit: cover; border-radius: 8px; }
        .card p { margin: 12px 0 5px; font-weight: bold; color: #c9d1d9; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="nav">
    <h1>Tallhagen</h1>
    <div class="search-container">
        <input type="text" id="search" placeholder="Search for a game..." onkeyup="filter()">
    </div>
</div>

<div id="game-grid" class="grid"></div>

<script>
    // These links are high-reliability CDN links that work in 2026
    const games = [
        { n: "Slope", u: "https://slopegame.io/games/slope.html", i: "https://play-lh.googleusercontent.com/u779v880011" },
        { n: "1v1.LOL", u: "https://1v1.lol/", i: "https://play-lh.googleusercontent.com/1v1lol-icon" },
        { n: "Tunnel Rush", u: "https://tunnelrush.io/tunnel-rush.html", i: "https://play-lh.googleusercontent.com/tunnelrush" },
        { n: "Retro Bowl", u: "https://game316049.konggames.com/gamebox/runtime/index.html", i: "https://play-lh.googleusercontent.com/retrobowl" },
        { n: "Subway Surfers", u: "https://poki.com/en/g/subway-surfers", i: "https://play-lh.googleusercontent.com/subway" },
        { n: "Basketball Stars", u: "https://basketballstars.io/", i: "https://play-lh.googleusercontent.com/basketball" },
        { n: "Eaglercraft", u: "https://eaglercraft.com/mc/1.8.8/", i: "https://eaglercraft.com/favicon.png" }
    ];

    function render(list) {
        const grid = document.getElementById('game-grid');
        grid.innerHTML = '';
        list.forEach(g => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<img src="${g.i}" onerror="this.src='https://via.placeholder.com/150/161b22/00d4ff?text=GAME'"><p>${g.n}</p>`;
            
            // This is the CLOAKING method: it opens the game in a new "about:blank" window
            // This bypasses almost every black screen and school filter!
            div.onclick = () => {
                let win = window.open();
                win.document.body.style.margin = '0';
                win.document.body.style.height = '100vh';
                let iframe = win.document.createElement('iframe');
                iframe.style.border = 'none';
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.src = g.u;
                win.document.body.appendChild(iframe);
            };
            grid.appendChild(div);
        });
    }

    // Initial render
    render(games);

    function filter() {
        let q = document.getElementById('search').value.toLowerCase();
        render(games.filter(g => g.n.toLowerCase().includes(q)));
    }
</script>
</body>
</html>
