<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Unblocked Games</title>
   <style>
    body {
        margin: 0;
        padding: 0;
        background: url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJpbmZ6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3/l41lTjJ8zZ6Z6Z6Z6/giphy.gif') no-repeat center center fixed;
        background-size: cover;
        color: white;
        font-family: 'Poppins', sans-serif;
    }

    .container {
        backdrop-filter: brightness(0.5) blur(5px);
        min-height: 100vh;
        padding: 20px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 25px;
        padding: 40px;
    }

    .card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        border-radius: 15px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 10px;
        text-align: center;
        transition: 0.4s;
        cursor: pointer;
    }

    .card:hover {
        transform: scale(1.1) rotate(2deg);
        background: rgba(255, 255, 255, 0.2);
        box-shadow: 0 0 20px #00d4ff;
        border: 1px solid #00d4ff;
    }

    .card img {
        width: 100%;
        border-radius: 10px;
        margin-bottom: 10px;
    }

    h1 {
        text-shadow: 0 0 10px #00d4ff;
        font-size: 3rem;
        letter-spacing: 5px;
    }
</style>
</head>
<body>
    <h1>🎮 Tallhagen Unblocked</h1>
    <div id="game-grid" class="grid">Loading Games...</div>

    <script>
        // This grabs the data from the forked repo's json file
        const hoverSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
const clickSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
hoverSound.volume = 0.2;
        fetch('games.json')
            .then(response => response.json())
            .then(data => {
                const grid = document.getElementById('game-grid');
                grid.innerHTML = ''; // Clear the loading text
                
                data.forEach(game => {
                    card.onmouseenter = () => hoverSound.play();
card.onclick = () => {
    clickSound.play();
    setTimeout(() => {
        window.location.href = `play.html?url=${game.game_url}`;
    }, 150);
};
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${game.game_image_icon}" alt="${game.name}">
                        <p>${game.name}</p>
                    `;
                    // When clicked, it opens the game link
                    card.onclick = () => {
                        window.location.href = `play.html?url=${game.game_url}`;
                    };
                    grid.appendChild(card);
                });
            });
    </script>
</body>
</html>
