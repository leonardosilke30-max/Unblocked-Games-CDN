<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tallhagen Unblocked</title>
    <style>
        body { margin: 0; background: #000; color: #00d4ff; font-family: sans-serif; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #111; border: 2px solid #333; border-radius: 10px; padding: 10px; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: #00d4ff; transform: scale(1.05); background: #1a1a1a; }
        .card img { width: 100%; border-radius: 5px; height: 100px; object-fit: cover; }
        h1 { padding: 20px; margin: 0; text-shadow: 0 0 10px #00d4ff; }
        #player { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; }
        iframe { width: 100%; height: 100%; border: none; }
        .close { position: absolute; top: 10px; right: 20px; background: red; color: #fff; padding: 10px; cursor: pointer; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

<div id="player">
    <div class="close" onclick="document.getElementById('player').style.display='none'; document.querySelector('iframe').src=''">CLOSE</div>
    <iframe src=""></iframe>
</div>

<h1>TALLHAGEN</h1>

<div class="grid">
    <div class="card" onclick="play('https://kdata1.com/2020/05/slope/')">
        <img src="https://static.gamedistribution.com/f27376c813d14282a5c5316f0f295192-512x512.jpeg">
        <p>Slope</p>
    </div>

    <div class="card" onclick="play('https://1v1.lol/')">
        <img src="https://static.gamedistribution.com/666657908f9d44f7988361099f36b048-512x512.jpeg">
        <p>1v1.LOL</p>
    </div>

    <div class="card" onclick="play('https://tunnelrush.org/')">
        <img src="https://static.gamedistribution.com/7123485750844781a7b82436f56e9c9c-512x512.jpeg">
        <p>Tunnel Rush</p>
    </div>

    <div class="card" onclick="play('https://eaglercraft.com/mc/1.8.8/')">
        <img src="https://via.placeholder.com/150/00d4ff/000?text=Minecraft">
        <p>Minecraft</p>
    </div>
</div>

<script>
    function play(url) {
        document.querySelector('iframe').src = url;
        document.getElementById('player').style.display = 'block';
    }
</script>

</body>
</html>
