<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Unblocked Games</title>
    <style>
        body {
    background-image: url('https://www.deviantart.com/danc3r10/art/Convergence-886894361');
    background-size: cover;
    background-attachment: fixed;
    background-position: center;
    color: white;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
}
    </style>
</head>
<body>
    <h1>🎮 Tallhagen Unblocked</h1>
    <div id="game-grid" class="grid">Loading Games...</div>

    <script>
        // This grabs the data from the forked repo's json file
        fetch('games.json')
            .then(response => response.json())
            .then(data => {
                const grid = document.getElementById('game-grid');
                grid.innerHTML = ''; // Clear the loading text
                
                data.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${game.game_image_icon}" alt="${game.name}">
                        <p>${game.name}</p>
                    `;
                    // When clicked, it opens the game link
                    card.onclick = () => {
                        window.location.href = `play.html?url=${game.game_url}`;
                    };
                    grid.appendChild(card);
                });
            });
    </script>
</body>
</html>
