<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Unblocked Games</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #333; border-radius: 8px; overflow: hidden; cursor: pointer; text-align: center; transition: 0.2s; border: 1px solid #444; }
        .card:hover { transform: translateY(-5px); background: #444; }
        .card img { width: 100%; height: 120px; object-fit: cover; }
        .card p { margin: 10px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🎮 My Unblocked Games</h1>
    <div id="game-grid" class="grid">Loading Games...</div>

    <script>
        // This grabs the data from the forked repo's json file
        fetch('games.json')
            .then(response => response.json())
            .then(data => {
                const grid = document.getElementById('game-grid');
                grid.innerHTML = ''; // Clear the loading text
                
                data.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${game.game_image_icon}" alt="${game.name}">
                        <p>${game.name}</p>
                    `;
                    // When clicked, it opens the game link
                    card.onclick = () => {
                        window.location.href = `play.html?url=${game.game_url}`;
                    };
                    grid.appendChild(card);
                });
            });
    </script>
</body>
</html>
