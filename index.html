<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Drive - Google Drive</title>
    <style>
        body { margin: 0; background: #0f0f0f; color: #00d4ff; font-family: 'Inter', sans-serif; }
        .nav { padding: 20px; background: #1a1a1a; border-bottom: 1px solid #333; text-align: center; font-weight: 800; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 40px; }
        .card { background: #1a1a1a; border-radius: 12px; padding: 10px; border: 1px solid #333; cursor: pointer; transition: 0.3s; text-align: center; }
        .card:hover { border-color: #00d4ff; transform: scale(1.05); box-shadow: 0 0 20px rgba(0,212,255,0.2); }
        .card img { width: 100%; height: 110px; object-fit: cover; border-radius: 8px; }
        .card p { margin-top: 10px; font-weight: bold; color: white; }
    </style>
</head>
<body>

<div class="nav">TALLHAGEN UNBLOCKED</div>

<div class="grid" id="game-grid"></div>

<script>
    // These strings are Base64 encoded. The school filter can't read them.
    const collection = [
        { n: "Slope", b: "aHR0cHM6Ly9rZGF0YTEuY29tLzIwMjAvMDUvc2xvcGUv", i: "https://static.gamedistribution.com/f27376c813d14282a5c5316f0f295192-512x512.jpeg" },
        { n: "Subway Surfers", b: "aHR0cHM6Ly9nYW1lcy5tYXRocGFwZXJzLm9yZy9zdWJ3YXktc3VyZmVycy8=", i: "https://static.gamedistribution.com/39d0910bc73a4413a2830846d0a7a794-512x512.jpeg" },
        { n: "Tunnel Rush", b: "aHR0cHM6Ly92NnA5ZDl0NC5zc2wuaHdjZG4ubmV0L2h0bWw1LzIzMzA3NDAvaW5kZXguaHRtbA==", i: "https://static.gamedistribution.com/7123485750844781a7b82436f56e9c9c-512x512.jpeg" },
        { n: "Retro Bowl", b: "aHR0cHM6Ly9nYW1lMzE2MDQ5LmtvbmdnYW1lcy5jb20vZ2FtZWJveC9ydW50aW1lL2luZGV4Lmh0bWw=", i: "https://static.gamedistribution.com/f25585863c37466580f488663806a090-512x512.jpeg" },
        { n: "Bitlife", b: "aHR0cHM6Ly9yYXcuZ2l0aGFjay5jb20vM2toMC8za2gwLWFzc2V0cy9tYWluL2JpdGxpZmUvaW5kZXguaHRtbA==", i: "https://via.placeholder.com/150/222/00d4ff?text=Bitlife" },
        { n: "Eggy Car", b: "aHR0cHM6Ly92NnA5ZDl0NC5zc2wuaHdjZG4ubmV0L2h0bWw1LzIxMTQ3NTcvindex.html", i: "https://static.gamedistribution.com/565d781a426f43e098807d478635848d-512x512.jpeg" }
    ];

    const grid = document.getElementById('game-grid');

    collection.forEach(game => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<img src="${game.i}"><p>${game.n}</p>`;
        
        div.onclick = () => {
            // Decodes the URL only at the micro-second you click
            const target = atob(game.b);
            const win = window.open('about:blank', '_blank');
            
            if (win) {
                win.document.title = "Google Docs";
                const style = win.document.createElement('style');
                style.textContent = "body,html{margin:0;padding:0;height:100%;overflow:hidden;}iframe{width:100%;height:100%;border:none;}";
                
                const iframe = win.document.createElement('iframe');
                iframe.src = target;
                
                win.document.head.appendChild(style);
                win.document.body.appendChild(iframe);
            } else {
                alert("Please allow pop-ups to play!");
            }
        };
        grid.appendChild(div);
    });
</script>
</body>
</html>
