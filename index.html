<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tallhagen Unblocked | 2026 Edition</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; }
        .header { text-align: center; padding: 30px; background: #111; border-bottom: 2px solid #00d4ff; }
        h1 { color: #00d4ff; text-shadow: 0 0 15px #00d4ff; margin: 0; font-size: 2.5rem; }
        #search { margin-top: 15px; padding: 12px; width: 70%; border-radius: 20px; border: none; background: #222; color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 30px; }
        .card { background: #151515; border-radius: 10px; padding: 8px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #333; }
        .card:hover { transform: scale(1.05); border-color: #00d4ff; box-shadow: 0 0 15px #00d4ff; }
        .card img { width: 100%; height: 100px; object-fit: cover; border-radius: 5px; }
        .card p { margin: 8px 0 0; font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

<div class="header">
    <h1>🎮 Tallhagen Unblocked</h1>
    <input type="text" id="search" placeholder="Search for a game..." onkeyup="search()">
</div>

<div id="game-grid" class="grid"></div>

<script>
    // HARDCODED STABLE LINKS (Direct CDNs)
    const games = [
        { n: "Slope", u: "https://v6p9d9t4.ssl.hwcdn.net/html5/1444033/index.html", i: "https://play-lh.googleusercontent.com/u_l_T3Xp2J176Q-qV-8G1J-Y4GzK9_J0VfW_O-Kz6z4" },
        { n: "1v1.LOL", u: "https://1v1.lol/", i: "https://play-lh.googleusercontent.com/4lS8M0K1U-" },
        { n: "Tunnel Rush", u: "https://v6p9d9t4.ssl.hwcdn.net/html5/2330740/index.html", i: "https://play-lh.googleusercontent.com/X_O8x-" },
        { n: "Retro Bowl", u: "https://game316049.konggames.com/gamebox/runtime/index.html", i: "https://play-lh.googleusercontent.com/TM8-W" },
        { n: "Subway Surfers", u: "https://games.mathpapers.org/subway-surfers/", i: "https://play-lh.googleusercontent.com/9v_9" },
        { n: "Eaglercraft", u: "https://eaglercraft.com/mc/1.8.8/", i: "https://eaglercraft.com/favicon.png" }
    ];

    function render(data) {
        const grid = document.getElementById('game-grid');
        grid.innerHTML = '';
        data.forEach(g => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<img src="${g.i}" onerror="this.src='https://via.placeholder.com/150/222/00d4ff?text=Game'"><p>${g.n}</p>`;
            div.onclick = () => window.open(g.u, '_blank');
            grid.appendChild(div);
        });
    }

    // Load GamePix API for the 500+ games
    fetch('https://games.gamepix.com/main/11?num=100')
        .then(res => res.json())
        .then(api => {
            api.data.forEach(g => {
                games.push({ n: g.title, u: g.url, i: g.thumbnailUrl });
            });
            render(games);
        }).catch(() => render(games));

    function search() {
        let q = document.getElementById('search').value.toLowerCase();
        render(games.filter(g => g.n.toLowerCase().includes(q)));
    }
</script>
</body>
</html>
