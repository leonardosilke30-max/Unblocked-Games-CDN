<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Drive - My Files</title>
    <style>
        :root { --bg: #0a0a0c; --card: #16161a; --accent: #00d4ff; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; }
        .nav { padding: 20px 50px; background: #111; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-weight: 900; letter-spacing: 2px; color: var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 40px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: 110px; object-fit: cover; }
        .card p { margin: 10px; font-size: 14px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="nav">
    <div class="logo">TALLHAGEN UNBLOCKED</div>
</div>

<div class="grid" id="grid"></div>

<script>
    // These are Base64 Encoded URLs. The school filter CANNOT read these.
    const collection = [
        { n: "Slope", e: "aHR0cHM6Ly9rZGF0YTEuY29tLzIwMjAvMDUvc2xvcGUv", i: "https://img.gamedistribution.com/f27376c813d14282a5c5316f0f295192-512x512.jpeg" },
        { n: "Subway Surfers", e: "aHR0cHM6Ly9nYW1lcy5tYXRocGFwZXJzLm9yZy9zdWJ3YXktc3VyZmVycy8=", i: "https://img.gamedistribution.com/39d0910bc73a4413a2830846d0a7a794-512x512.jpeg" },
        { n: "Tunnel Rush", e: "aHR0cHM6Ly91Ymc3Ny5naXRodWIuaW8vZWRpdC90dW5uZWwtcnVzaC8=", i: "https://img.gamedistribution.com/7123485750844781a7b82436f56e9c9c-512x512.jpeg" },
        { n: "Retro Bowl", e: "aHR0cHM6Ly91Ymc3Ny5naXRodWIuaW8vZWRpdC9yZXRyby1ib3dsLw==", i: "https://img.gamedistribution.com/f25585863c37466580f488663806a090-512x512.jpeg" },
        { n: "1v1.LOL", e: "aHR0cHM6Ly8xdjEubG9sLw==", i: "https://img.gamedistribution.com/666657908f9d44f7988361099f36b048-512x512.jpeg" }
    ];

    const container = document.getElementById('grid');

    collection.forEach(game => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<img src="${game.i}"><p>${game.n}</p>`;
        
        div.onclick = () => {
            // Decodes the gibberish back into a URL only at the moment of clicking
            const decodedUrl = atob(game.e);
            
            const win = window.open('about:blank', '_blank');
            if (win) {
                win.document.title = "Google Docs";
                const iframe = win.document.createElement('iframe');
                iframe.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;border:none;margin:0;padding:0;overflow:hidden;z-index:999999;";
                iframe.src = decodedUrl;
                win.document.body.appendChild(iframe);
            } else {
                alert("Pop-up blocked! Please allow pop-ups for this site.");
            }
        };
        container.appendChild(div);
    });
</script>

</body>
</html>
