<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Google Drive</title> <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --accent: #3498db; --text: #ffffff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
        
        /* PlayGama Style Header */
        .navbar { display: flex; align-items: center; justify-content: space-between; padding: 15px 50px; background: #111; border-bottom: 1px solid #333; }
        .logo { font-size: 24px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        
        /* Game Grid */
        .container { padding: 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .game-card { background: var(--card); border-radius: 12px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid transparent; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .game-card img { width: 100%; height: 120px; object-fit: cover; }
        .game-info { padding: 12px; text-align: center; font-size: 14px; font-weight: 600; }

        /* Banner like top sites */
        .banner { height: 200px; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://wallpaperaccess.com/full/1567831.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">TALLHAGEN</div>
</div>

<div class="banner">
    <h1 style="font-size: 3rem; margin: 0;">2026 UNBLOCKED</h1>
    <p style="color: #aaa;">Encrypted & Cloaked Games</p>
</div>

<div class="container" id="game-grid">
    </div>

<script>
    const gameData = [
        { title: "Slope", url: "https://kdata1.com/2020/05/slope/", thumb: "https://static.gamedistribution.com/f27376c813d14282a5c5316f0f295192-512x512.jpeg" },
        { title: "Subway Surfers", url: "https://games.mathpapers.org/subway-surfers/", thumb: "https://static.gamedistribution.com/39d0910bc73a4413a2830846d0a7a794-512x512.jpeg" },
        { title: "1v1.LOL", url: "https://1v1.lol/", thumb: "https://static.gamedistribution.com/666657908f9d44f7988361099f36b048-512x512.jpeg" },
        { title: "Tunnel Rush", url: "https://v6p9d9t4.ssl.hwcdn.net/html5/2330740/index.html", thumb: "https://static.gamedistribution.com/7123485750844781a7b82436f56e9c9c-512x512.jpeg" },
        { title: "Retro Bowl", url: "https://game316049.konggames.com/gamebox/runtime/index.html", thumb: "https://static.gamedistribution.com/f25585863c37466580f488663806a090-512x512.jpeg" },
        { title: "Bitlife", url: "https://ubg77.github.io/edit/bitlife/", thumb: "https://play-lh.googleusercontent.com/69RY_6Y9asvUlsjK23n6o45f096X1vI-C339Wqj3N6O_K6W6Y6K" }
    ];

    const grid = document.getElementById('game-grid');

    gameData.forEach(game => {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `<img src="${game.thumb}"><div class="game-info">${game.title}</div>`;
        
        card.onclick = () => {
            // THE CLOAKING TRICK (EXACTLY LIKE PLAYGAMA)
            const win = window.open();
            win.document.title = "Google Docs"; // Tab name for teachers
            const style = win.document.createElement('style');
            style.textContent = `
                body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
                iframe { width: 100%; height: 100%; border: none; }
            `;
            const iframe = win.document.createElement('iframe');
            iframe.src = game.url;
            
            win.document.head.appendChild(style);
            win.document.body.appendChild(iframe);
        };
        grid.appendChild(card);
    });

    // Force clear old cache
    console.log("Site Version 2.0.1 Loaded");
</script>
</body>
</html>
