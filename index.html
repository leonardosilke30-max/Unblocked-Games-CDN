<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Unblocked Games</title>
    <style>
        body {
     body { background: #333: black; font-family: sans-serif; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .game-card { background: #222; padding: 10px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .game-card:hover { transform: scale(1.05); background: #333; }
        img { width: 100%; border-radius: 5px; }
}
    </style>
</head>
<body>
    <h1>🎮 Tallhagen Unblocked</h1>
    <div id="game-grid" class="grid">Loading Games...</div>

    <script>
        // This grabs the data from the forked repo's json file
        fetch('games.json')
            .then(response => response.json())
            .then(data => {
                const grid = document.getElementById('game-grid');
                grid.innerHTML = ''; // Clear the loading text
                
                data.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${game.game_image_icon}" alt="${game.name}">
                        <p>${game.name}</p>
                    `;
                    // When clicked, it opens the game link
                    card.onclick = () => {
                        window.location.href = `play.html?url=${game.game_url}`;
                    };
                    grid.appendChild(card);
                });
            });
    </script>
</body>
</html>
