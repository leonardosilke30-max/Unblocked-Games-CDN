<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tallhagen | 2026 Mirror</title>
    <style>
        body { margin: 0; background: #050505; color: #00d4ff; font-family: 'Segoe UI', sans-serif; }
        .nav { background: #111; padding: 25px; text-align: center; border-bottom: 2px solid #00d4ff; }
        h1 { margin: 0; font-size: 2.2rem; letter-spacing: 3px; text-shadow: 0 0 10px #00d4ff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 30px; }
        .card { background: #1a1a1a; border-radius: 10px; padding: 10px; border: 1px solid #333; cursor: pointer; transition: 0.2s; text-align: center; }
        .card:hover { border-color: #00d4ff; transform: scale(1.05); }
        .card img { width: 100%; height: 100px; object-fit: cover; border-radius: 5px; }
        .card p { margin: 10px 0 0; font-weight: bold; color: #fff; }
        #player { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        iframe { width: 100%; height: 100%; border: none; }
        .close { position: absolute; top: 15px; left: 15px; background: #ff0000; color: #fff; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 8px; z-index: 10000; }
    </style>
</head>
<body>

<div id="player">
    <div class="close" onclick="closeGame()">✖ CLOSE</div>
    <iframe id="game-frame" src=""></iframe>
</div>

<div class="nav">
    <h1>TALLHAGEN</h1>
</div>

<div class="grid" id="grid"></div>

<script>
    // These use the same mirror logic as your working Slope/Subway links
    const gameList = [
        { n: "Slope", u: "https://kdata1.com/2020/05/slope/", i: "https://via.placeholder.com/150/00d4ff/000?text=Slope" },
        { n: "Subway Surfers", u: "https://games.mathpapers.org/subway-surfers/", i: "https://via.placeholder.com/150/00d4ff/000?text=Subway" },
        { n: "Tunnel Rush", u: "https://ubg77.github.io/edit/tunnel-rush/", i: "https://via.placeholder.com/150/00d4ff/000?text=Tunnel+Rush" },
        { n: "Retro Bowl", u: "https://ubg77.github.io/edit/retro-bowl/", i: "https://via.placeholder.com/150/00d4ff/000?text=Retro+Bowl" },
        { n: "Bitlife", u: "https://ubg77.github.io/edit/bitlife/", i: "https://via.placeholder.com/150/00d4ff/000?text=Bitlife" },
        { n: "Minecraft", u: "https://precisionclient.pages.dev/", i: "https://via.placeholder.com/150/00d4ff/000?text=Minecraft" },
        { n: "Eggy Car", u: "https://ubg77.github.io/edit/eggy-car/", i: "https://via.placeholder.com/150/00d4ff/000?text=Eggy+Car" }
    ];

    const grid = document.getElementById('grid');
    gameList.forEach(game => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<img src="${game.i}"><p>${game.n}</p>`;
        card.onclick = () => {
            document.getElementById('game-frame').src = game.u;
            document.getElementById('player').style.display = 'block';
        };
        grid.appendChild(card);
    });

    function closeGame() {
        document.getElementById('player').style.display = 'none';
        document.getElementById('game-frame').src = '';
    }
</script>
</body>
</html>
