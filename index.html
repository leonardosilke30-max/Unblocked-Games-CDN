<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tallhagen Unblocked</title>
    <style>
        body { margin: 0; background: #080808; color: white; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 30px; }
        .card { background: #151515; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; border: 1px solid #333; transition: 0.3s; }
        .card:hover { border-color: #00d4ff; transform: scale(1.05); }
        .card img { width: 100%; border-radius: 5px; height: 110px; object-fit: cover; }
        h1 { text-align: center; color: #00d4ff; padding-top: 20px; }
    </style>
</head>
<body>
    <h1>🎮 Tallhagen Unblocked</h1>
    <div id="game-grid" class="grid">Loading Games...</div>

    <script>
        // Using a more reliable feed that doesn't block as easily
        fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://raw.githubusercontent.com/skid-inc/skid-inc.github.io/main/games.json'))
        .then(response => response.json())
        .then(data => {
            const games = JSON.parse(data.contents);
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${game.game_image_icon}"><p>${game.name}</p>`;
                card.onclick = () => {
                    // This opens the game in a NEW TAB to bypass the black screen/iframe block
                    window.open(game.game_url, '_blank');
                };
                grid.appendChild(card);
            });
        })
        .catch(() => { document.getElementById('game-grid').innerHTML = "Connection Error. Try again later."; });
    </script>
</body>
</html>
