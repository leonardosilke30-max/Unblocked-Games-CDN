<!DOCTYPE html>
<html>
<head>
    <title>Playing Game</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .back-btn { position: absolute; top: 10px; left: 10px; padding: 10px 20px; background: #00d4ff; color: #000; font-weight: bold; border-radius: 5px; text-decoration: none; font-family: sans-serif; opacity: 0.5; transition: 0.3s; }
        .back-btn:hover { opacity: 1; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">BACK</a>
    <div id="player"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let gameUrl = urlParams.get('url');

        if (gameUrl) {
            // Decodes the URL so the browser can read it correctly
            gameUrl = decodeURIComponent(gameUrl);
            document.getElementById('player').innerHTML = `<iframe src="${gameUrl}" allowfullscreen></iframe>`;
        } else {
            document.getElementById('player').innerHTML = `<h1 style="color:white; text-align:center;">Game Link Missing!</h1>`;
        }
    </script>
</body>
</html>
